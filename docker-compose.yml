services:
  api:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    environment:
      CHROMA_HOST: chroma
    depends_on: [chroma]
    volumes: ["./data:/app/data"]

  chroma:
    image: chromadb/chroma:latest
    ports: ["8001:8000"]
    volumes: ["chroma-data:/chroma/chroma"]

volumes:
  chroma-data:
